name: 🚀 Deploy Professor Bot

on:
  push:
    paths:
      - 'professor_bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: SSH into EC2 and deploy Professor Bot
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/professor_bot
          git pull origin main
          pkill -f professor_bot.py || true
          nohup python3 professor_bot.py > prof.log 2>&1 &
