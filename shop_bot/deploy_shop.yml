name: 💰 Deploy Shop Bot

on:
  push:
    paths:
      - 'shop_bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: SSH into EC2 and deploy Shop Bot
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/shop_bot
          git pull origin main
          pkill -f shop_bot.py || true
          nohup python3 shop_bot.py > shop.log 2>&1 &
